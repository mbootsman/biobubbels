<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>● Biobubbels ● Binnenkort online</title>
  <link rel="icon" type="image/svg+xml" href="img/biobubbels-favicon.svg">
  <style>
    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('font/CormorantGaramond-VariableFont_wght.woff2') format('woff2');
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Cormorant Garamond';
      src: url('font/CormorantGaramond-Italic-VariableFont_wght.woff2') format('woff2');
      font-weight: 300 700;
      font-style: italic;
      font-display: swap;
    }

    @font-face {
      font-family: 'Inter';
      src: url('font/Inter-VariableFont_opsz,wght.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Inter';
      src: url('font/Inter-Italic-VariableFont_opsz,wght.woff2') format('woff2');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    :root {
      --dark-green: #1E3A2F;
      --gold: #D9B98A;
      --cream: #F5EFE4;
      --brown: #6B5B3E;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 24px;
      background: var(--dark-green);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--cream);
      overflow-y: auto;
      position: relative;
    }

    .bubbles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bubbles span {
      position: absolute;
      bottom: -10%;
      display: block;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.35;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      90% {
        opacity: 0.3;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 560px;
      margin: 0 auto;
    }

    .logo {
      width: min(90vw, 420px);
      height: auto;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-style: italic;
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      letter-spacing: 0.5px;
      margin: 0 0 0.9rem;
      color: var(--cream);
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      letter-spacing: 0.3px;
      color: var(--gold);
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--brown);
    }
  </style>
</head>
<body>
  <div class="bubbles" aria-hidden="true">
    <span style="left: 12%; width: 8px; height: 8px; animation-duration: 9s; animation-delay: 0s;"></span>
    <span style="left: 22%; width: 5px; height: 5px; animation-duration: 7s; animation-delay: 1.5s;"></span>
    <span style="left: 35%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 3s;"></span>
    <span style="left: 48%; width: 6px; height: 6px; animation-duration: 8s; animation-delay: 0.5s;"></span>
    <span style="left: 60%; width: 7px; height: 7px; animation-duration: 10s; animation-delay: 2.5s;"></span>
    <span style="left: 72%; width: 4px; height: 4px; animation-duration: 6.5s; animation-delay: 4s;"></span>
    <span style="left: 83%; width: 9px; height: 9px; animation-duration: 9.5s; animation-delay: 1s;"></span>
    <span style="left: 92%; width: 5px; height: 5px; animation-duration: 7.5s; animation-delay: 3.5s;"></span>
  </div>

  <main>
    <img class="logo" src="img/biobubbels-logo-primair-donkergroen.svg" alt="Biobubbels — biologisch mousserend">
    <h1>Onze website bruist bijna.</h1>
    <p>We zijn hard aan het werk om iets moois voor je klaar te zetten.<br>Kom binnenkort terug, of <a href="mailto:info@biobubbels.nl">mail ons op info@biobubbels.nl</a>
</p>
  </main>

  <footer>
    &copy; 2026 Biobubbels ● <a href="https://structuredchaos.nl/" target="_blank" rel="noopener noreferrer">Onderdeel van Structured Chaos B.V.</a><br>
  </footer>
</body>
</html>
